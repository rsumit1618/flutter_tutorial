name: flutter_tutorial
description: A Flutter project demonstrating Hive vs SQLite
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Your existing dependencies
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9
  dio: ^5.4.0
  shared_preferences: ^2.2.2

  # NEW: Hive Dependencies
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # NEW: SQLite Dependencies
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.0

  # NEW: UI Helpers
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mockito: ^5.4.3
  sqflite_common_ffi: ^2.3.0
  build_runner: ^2.4.7        # For Hive code generation
  hive_generator: ^2.0.1      # For Hive code generation
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true